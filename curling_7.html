<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Кёрлинг</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --ice-light:#eaf6fb;
    --ice-deep:#c9e7f2;
    --rink-navy:#0b1f33;
    --rink-navy-2:#12314f;
    --frost:#f5fbfd;
    --stone-red:#c1453d;
    --stone-red-dark:#7e2c26;
    --stone-yellow:#e3ab38;
    --stone-yellow-dark:#9c701f;
    --cyan:#54d6e3;
    --ring-blue:#3a78b5;
    --text-light:#eaf6fb;
    --text-dim:#8fb0c4;
    --panel:#0e2840;
    --panel-edge:#1d4264;
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; touch-action:manipulation;}

  html{
    height: 100%;
    /* fill the whole viewport including under status bar on iOS */
    height: -webkit-fill-available;
  }

  body{
    margin:0; padding:0;
    height:100%; height:-webkit-fill-available;
    background: radial-gradient(circle at 50% -10%, var(--rink-navy-2), var(--rink-navy) 70%);
    color:var(--text-light);
    font-family:'Inter', system-ui, sans-serif;
    overflow:hidden;
    user-select:none;
  }

  .display{ font-family:'Bebas Neue', Impact, sans-serif; letter-spacing:0.06em; }

  /* ══ APP SHELL ══ */
  #app{
    width:100%; height:100%;
    display:flex; flex-direction:column;
    align-items:center;
    /* safe area insets for notched phones */
    padding: env(safe-area-inset-top, 6px) env(safe-area-inset-right, 8px) env(safe-area-inset-bottom, 8px) env(safe-area-inset-left, 8px);
    max-width:1100px; margin:0 auto;
    gap: 6px;
  }

  /* ══ HUD ══ */
  #hud{
    width:100%; max-width:560px;
    display:flex; align-items:center; justify-content:space-between;
    padding:6px 12px;
    background:linear-gradient(180deg, var(--panel), #0a1e30);
    border:1px solid var(--panel-edge);
    border-radius:12px;
    flex-shrink: 0;
  }
  .hud-side{ display:flex; flex-direction:column; align-items:center; gap:2px; min-width:70px;}
  .hud-name{ font-size:11px; font-weight:700; letter-spacing:0.03em; color:var(--text-dim);}
  .hud-name.active{ color:var(--cyan); }
  .hud-score{ font-family:'Bebas Neue',sans-serif; font-size:26px; line-height:1;}
  .hud-dots{ display:flex; gap:3px; margin-top:1px;}
  .dot{ width:6px; height:6px; border-radius:50%; background:#274a64; border:1px solid #3a6685;}
  .dot.used{ background:var(--text-dim); border-color:var(--text-dim); opacity:0.5;}
  .dot.p1{ background:var(--stone-red); border-color:var(--stone-red-dark);}
  .dot.p2{ background:var(--stone-yellow); border-color:var(--stone-yellow-dark);}
  .hud-mid{ display:flex; flex-direction:column; align-items:center; gap:1px;}
  .hud-vs{ font-size:10px; color:var(--text-dim); font-weight:600;}
  .hud-end{ font-size:10px; color:var(--cyan); font-weight:700; letter-spacing:0.05em;}

  /* ══ MAIN AREA: stage takes all remaining space ══ */
  #main{
    width:100%;
    display:flex;
    flex-direction: row;
    align-items:center; justify-content:center;
    gap:14px; flex:1; min-height:0;
  }

  /* ══ STAGE ══ */
  @keyframes cabinetGlow{
    0%,100%{ box-shadow:0 6px 20px rgba(0,0,0,0.45), inset 0 0 0 1px rgba(255,255,255,0.08), 0 0 0 2px #d9a440, 0 0 18px 3px rgba(217,164,64,0.5); }
    50%{ box-shadow:0 6px 20px rgba(0,0,0,0.45), inset 0 0 0 1px rgba(255,255,255,0.08), 0 0 0 2px #54d6e3, 0 0 22px 5px rgba(84,214,227,0.5); }
  }
  @media (prefers-reduced-motion: reduce){ #stage{ animation:none; } }

  /* DESKTOP: stage on right, controls on left */
  #stage{
    position:relative;
    /* fill height, respect aspect ratio */
    height: min(calc(100vh - 110px), calc((100vw - 200px) * 760 / 460));
    aspect-ratio: 460/760;
    border-radius:12px;
    overflow:hidden;
    animation: cabinetGlow 3.6s ease-in-out infinite;
    flex-shrink:0;
    order:2;
  }

  canvas{ width:100%; height:100%; display:block; touch-action:none; }

  #muteBtn{
    position:absolute; top:8px; right:8px; z-index:16;
    width:32px; height:32px; border-radius:50%;
    background:rgba(11,31,51,0.6); border:1px solid rgba(255,255,255,0.2);
    color:var(--frost); font-size:15px; cursor:pointer; line-height:1;
    display:flex; align-items:center; justify-content:center;
    /* big tap target */
    min-width:44px; min-height:44px;
  }

  /* ══ LEFT CONTROLS (desktop) ══ */
  #controls{
    width:140px; flex-shrink:0; order:1;
    display:flex; flex-direction:column; align-items:center; gap:8px;
    padding-top:4px;
  }

  #menuBtn{
    appearance:none; border:1px solid var(--panel-edge); cursor:pointer;
    background:var(--panel); color:var(--text-dim); font-weight:600; font-size:12px;
    padding:10px 10px; border-radius:10px; width:100%;
    min-height: 44px;
  }
  #menuBtn:hover{ color:var(--text-light); border-color:var(--cyan); }

  #instruction{
    font-size:12px; color:var(--text-dim); text-align:center; min-height:14px;
    font-weight:500; width:100%; line-height:1.4;
  }

  /* power gauge */
  #gaugeWrap{ display:flex; flex-direction:column; align-items:center; visibility:hidden; height:0; }
  #gaugeWrap.show{ visibility:visible; height:auto; }
  #gaugeLabelFar{ font-size:9px; color:var(--text-dim); margin-bottom:3px; letter-spacing:0.05em;}
  #gaugeLabelNear{ font-size:9px; color:var(--text-dim); margin-top:3px; letter-spacing:0.05em;}
  .gauge{
    position:relative; width:28px; height:160px;
    border-radius:14px;
    border:2px solid rgba(255,255,255,0.25);
    overflow:hidden;
  }
  .gauge .centerMark{
    position:absolute; left:-3px; right:-3px; height:2px;
    background:#fff6d8; box-shadow:0 0 4px 1px rgba(255,246,216,0.9);
  }
  #marker{
    position:absolute; left:50%; width:12px; height:12px; margin-left:-6px;
    border-radius:50%; background:var(--frost);
    box-shadow:0 0 6px 2px rgba(255,255,255,0.8), 0 0 0 2px var(--rink-navy);
    transition:none;
  }

  button.secondary{
    appearance:none; border:1px solid var(--panel-edge); cursor:pointer;
    background:var(--panel); color:var(--text-light); font-weight:600; font-size:14px;
    padding:11px 22px; border-radius:24px;
  }

  /* ══════════════════════════════════════════════════
     MOBILE  ≤ 600 px  — portrait phone layout
     stage fills width, controls strip below
  ══════════════════════════════════════════════════ */
  @media (max-width:600px){

    #app{
      padding: env(safe-area-inset-top, 4px) 8px env(safe-area-inset-bottom, 4px);
      gap: 4px;
    }

    #hud{
      padding: 5px 10px;
    }
    .hud-score{ font-size:22px; }

    /* stack: stage on top, controls strip below */
    #main{
      flex-direction: column;
      gap: 4px;
    }

    /* stage: full width, height = width * (760/460), but capped so controls fit */
    #stage{
      order: 1;
      width: 100%;
      /* leave ~76px for the control strip + gaps */
      height: min(
        calc(100vw * 760 / 460),
        calc(100vh - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px) - 130px)
      );
      aspect-ratio: unset; /* height is explicit, width=100% */
      border-radius: 10px;
    }

    /* compact horizontal controls strip */
    #controls{
      order: 2;
      width: 100%;
      max-width: unset;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      padding: 0 2px;
      gap: 8px;
      flex-shrink: 0;
      height: 64px;
    }

    #menuBtn{
      width: auto;
      flex-shrink: 0;
      padding: 10px 14px;
      font-size: 12px;
      border-radius: 22px;
      white-space: nowrap;
    }

    #instruction{
      flex: 1;
      font-size: 11px;
      text-align: center;
      line-height: 1.35;
    }

    /* gauge goes horizontal on mobile */
    #gaugeWrap{
      flex-direction: row;
      align-items: center;
      gap: 5px;
      height: auto !important;
    }
    #gaugeWrap.show{ visibility:visible; }

    #gaugeLabelFar{ margin-bottom:0; margin-right:0; font-size:8px; }
    #gaugeLabelNear{ margin-top:0; margin-left:0; font-size:8px; }

    .gauge{
      width: 120px;
      height: 24px;
      border-radius: 12px;
      /* rotate the gradient and marker to horizontal */
    }

    /* rewrite gauge to horizontal */
    .gauge .centerMark{
      top: -3px; bottom: -3px;
      left: 50%; right: unset;
      width: 2px; height: unset;
      transform: translateX(-50%);
    }

    #marker{
      top: 50%;
      left: 0;
      margin-top: -6px;
      margin-left: 0;
      transform: translateY(-50%);
      /* JS sets left%, not top% on mobile — handled in script patch */
    }
  }

  /* ══ OVERLAYS ══ */
  .overlay{
    position:absolute; inset:0; z-index:20;
    background:radial-gradient(circle at 50% 0%, rgba(18,49,79,0.97), rgba(11,31,51,0.99));
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:16px; text-align:center; padding:20px;
  }
  #app{ position:relative; }
  .title{
    font-family:'Bebas Neue', sans-serif; font-size:clamp(22px, 8vw, 38px); letter-spacing:0.02em;
    color:var(--frost); text-shadow:0 0 18px rgba(84,214,227,0.5);
    max-width:100%;
  }
  .subtitle{ color:var(--text-dim); font-size:13px; margin-top:-10px; }

  @keyframes bulbBlink{ 0%,40%{opacity:1;} 50%,90%{opacity:0.25;} 100%{opacity:1;} }
  .bulbRow{ display:flex; gap:7px; }
  .bulbRow span{
    width:7px; height:7px; border-radius:50%;
    background:#ffd76a; box-shadow:0 0 6px 2px rgba(255,215,106,0.8);
    animation: bulbBlink 1.4s steps(2,jump-none) infinite;
  }
  @media (prefers-reduced-motion: reduce){ .bulbRow span{ animation:none; } }

  .modebtn{
    appearance:none; border:1px solid var(--panel-edge); cursor:pointer;
    background:linear-gradient(180deg, var(--panel), #0a1e30);
    color:var(--text-light); padding:16px 22px; border-radius:14px;
    font-size:16px; font-weight:700; width:min(240px, 80vw);
    display:flex; align-items:center; justify-content:center; gap:10px;
    min-height: 54px;
  }
  .modebtn .chip{ width:10px; height:10px; border-radius:50%; }
  .modebtn:hover{ border-color:var(--cyan); }

  .scoreboard{ display:flex; gap:30px; align-items:flex-end; }
  .sb-col{ display:flex; flex-direction:column; align-items:center; gap:6px;}
  .sb-name{ font-size:13px; color:var(--text-dim); font-weight:700;}
  .sb-num{ font-family:'Bebas Neue',sans-serif; font-size:54px; line-height:1;}
  .sb-win{ color:var(--cyan); }

  .hidden{ display:none !important; }

  #toast{
    position:absolute; top:54px; left:50%; transform:translateX(-50%);
    background:rgba(14,40,64,0.92); border:1px solid var(--panel-edge);
    padding:6px 14px; border-radius:20px; font-size:12px; font-weight:600;
    color:var(--cyan); opacity:0; pointer-events:none; transition:opacity 0.25s ease;
    z-index:15; white-space:nowrap;
  }
  #toast.show{ opacity:1; }
</style>
</head>
<body>
<div id="app">

  <div id="hud">
    <div class="hud-side">
      <div class="hud-name" id="p1name">PLAYER 1</div>
      <div class="hud-score" id="p1score" style="color:var(--stone-red)">0</div>
      <div class="hud-dots" id="p1dots"></div>
    </div>
    <div class="hud-mid">
      <div class="hud-vs">КЁРЛИНГ</div>
      <div class="hud-end" id="endLabel">КОНЕЦ 1</div>
    </div>
    <div class="hud-side">
      <div class="hud-name" id="p2name">PLAYER 2</div>
      <div class="hud-score" id="p2score" style="color:var(--stone-yellow)">0</div>
      <div class="hud-dots" id="p2dots"></div>
    </div>
  </div>

  <div id="main">

  <div id="controls">
    <button id="menuBtn">⟵ Меню</button>
    <div id="instruction">&nbsp;</div>
    <div id="gaugeWrap">
      <div id="gaugeLabelFar">сильно</div>
      <div class="gauge" id="gaugeBar">
        <div class="centerMark" id="centerMark"></div>
        <div id="marker"></div>
      </div>
      <div id="gaugeLabelNear">слабо</div>
    </div>
  </div>

  <div id="stage">
    <canvas id="rink" width="460" height="760"></canvas>
    <div id="toast"></div>
    <button id="muteBtn" aria-label="Звук">🔊</button>

    <div class="overlay" id="menuOverlay">
      <div class="bulbRow">
        <span style="animation-delay:0s"></span><span style="animation-delay:0.2s"></span><span style="animation-delay:0.4s"></span><span style="animation-delay:0.6s"></span><span style="animation-delay:0.8s"></span>
      </div>
      <div class="title">КЁРЛИНГ</div>
      <div class="subtitle">Выберите режим игры</div>
      <button class="modebtn" id="modePvP"><span class="chip" style="background:var(--stone-red)"></span>Player 1 and Player 2</button>
      <button class="modebtn" id="modeAI"><span class="chip" style="background:var(--stone-yellow)"></span>Player 1 and AI</button>
    </div>

    <div class="overlay hidden" id="endOverlay">
      <div class="title" id="endTitle">КОНЕЦ ИГРЫ</div>
      <div class="scoreboard">
        <div class="sb-col">
          <div class="sb-name" style="color:var(--stone-red)" id="finalP1name">PLAYER 1</div>
          <div class="sb-num" id="finalP1score">0</div>
        </div>
        <div class="sb-col">
          <div class="sb-name" style="color:var(--stone-yellow)" id="finalP2name">PLAYER 2</div>
          <div class="sb-num" id="finalP2score">0</div>
        </div>
      </div>
      <div class="subtitle" id="endSubtitle"></div>
      <button class="modebtn" id="playAgainBtn" style="width:200px;">Играть снова</button>
    </div>
  </div>

  </div>

</div>

<script>
(function(){
  'use strict';

  // ============================================================
  //  GEOMETRY / CONSTANTS
  // ============================================================
  const SHEET_W = 460, SHEET_H = 760;
  const MARGIN = 34;
  const STONE_R = 16;
  const HACK_Y = SHEET_H - 80;
  const HOUSE_Y = 300;                                      // a bit above mid-sheet — leaves open ice beyond the house for big takeout shots
  const RINGS = { outer: 108, mid: 82, inner: 56, button: 22 }; // bigger rings = easier to hit
  // Closer to the centre = more points. Bullseye (button) = 100.
  const RING_BANDS = [
    { upTo: RINGS.button,            pts: 100, color: '#e3473d', glow: true  },
    { upTo: RINGS.inner,             pts: 50,  color: '#e8932f', glow: false },
    { upTo: RINGS.mid,                pts: 25,  color: '#3fc1b0', glow: false },
    { upTo: RINGS.outer,              pts: 10,  color: '#2f7fc4', glow: false }
  ];
  function pointsForDistance(d){
    for(const band of RING_BANDS){ if(d <= band.upTo) return band.pts; }
    if(d <= RINGS.outer + STONE_R) return 10;
    return 0;
  }
  function pointsForStone(s){
    return pointsForDistance(Math.hypot(s.x - POS_CENTER, s.y - HOUSE_Y));
  }

  const POS_CENTER = SHEET_W/2;
  const POS_AMP = POS_CENTER - MARGIN - STONE_R;          // lateral oscillation amplitude
  const ANGLE_MAX = 22 * Math.PI/180;                      // max throw angle from vertical
  const ARROW_LEN = 78;

  const SPEED_MIN = 150, SPEED_MAX = 392;                   // px/s at power=0 / power=1
  const FRICTION = 122;                                     // px/s^2 deceleration
  const CURL_ACCEL = 9;                                     // px/s^2 lateral curl
  const REST_EPS = 4;                                       // speed below this => stop

  const OSC_PERIOD_POS = 2.25;     // seconds for a full left-right cycle (slowed down, still brisk)
  const OSC_PERIOD_ANGLE = 1.95;
  const OSC_PERIOD_POWER = 2.5;

  const STONES_PER_PLAYER = 4;

  // ------------------------------------------------------------
  // Power-gauge calibration: the gauge (0 = weak .. 1 = full power) is
  // painted with the SAME zone radii/colours as the house, so the
  // player can see exactly which power lands the stone dead-centre.
  // ------------------------------------------------------------
  const CENTER_DIST = HACK_Y - HOUSE_Y;            // forward distance, hack -> button
  function speedForPower(p){ return SPEED_MIN + (SPEED_MAX - SPEED_MIN) * p; }
  function powerForDistance(d){
    const v = Math.sqrt(Math.max(0, 2*FRICTION*d));
    return Math.max(0, Math.min(1, (v - SPEED_MIN) / (SPEED_MAX - SPEED_MIN)));
  }
  const GAUGE_NEUTRAL = '#4f7188';                  // too weak / too strong — won't reach the house

  const B_ENTER_10  = powerForDistance(CENTER_DIST - RINGS.outer);
  const B_ENTER_25  = powerForDistance(CENTER_DIST - RINGS.mid);
  const B_ENTER_50  = powerForDistance(CENTER_DIST - RINGS.inner);
  const B_ENTER_100 = powerForDistance(CENTER_DIST - RINGS.button);
  const B_EXIT_100  = powerForDistance(CENTER_DIST + RINGS.button);
  const B_EXIT_50   = powerForDistance(CENTER_DIST + RINGS.inner);
  const B_EXIT_25   = powerForDistance(CENTER_DIST + RINGS.mid);
  const B_EXIT_10   = powerForDistance(CENTER_DIST + RINGS.outer);
  const POWER_CENTER = powerForDistance(CENTER_DIST);   // exact dead-centre power

  const GAUGE_SEGMENTS = [
    { from:0,           to:B_ENTER_10,  color:GAUGE_NEUTRAL },
    { from:B_ENTER_10,  to:B_ENTER_25,  color:'#2f7fc4' },
    { from:B_ENTER_25,  to:B_ENTER_50,  color:'#3fc1b0' },
    { from:B_ENTER_50,  to:B_ENTER_100, color:'#e8932f' },
    { from:B_ENTER_100, to:B_EXIT_100,  color:'#e3473d' },
    { from:B_EXIT_100,  to:B_EXIT_50,   color:'#e8932f' },
    { from:B_EXIT_50,   to:B_EXIT_25,   color:'#3fc1b0' },
    { from:B_EXIT_25,   to:B_EXIT_10,   color:'#2f7fc4' },
    { from:B_EXIT_10,   to:1,           color:GAUGE_NEUTRAL }
  ];

  function isMobileLayout(){ return window.innerWidth <= 600; }

  function paintGauge(){
    const stops = [];
    if(isMobileLayout()){
      // horizontal gauge: left = weak (0), right = strong (1)
      for(let i=0; i<GAUGE_SEGMENTS.length; i++){
        const seg = GAUGE_SEGMENTS[i];
        const l = (seg.from*100).toFixed(2)+'%';
        const r = (seg.to*100).toFixed(2)+'%';
        stops.push(seg.color+' '+l);
        stops.push(seg.color+' '+r);
      }
      document.getElementById('gaugeBar').style.background = 'linear-gradient(90deg, '+stops.join(', ')+')';
      document.getElementById('centerMark').style.left = (POWER_CENTER*100).toFixed(2)+'%';
      document.getElementById('centerMark').style.top = '';
    } else {
      // original vertical gauge
      for(let i=GAUGE_SEGMENTS.length-1; i>=0; i--){
        const seg = GAUGE_SEGMENTS[i];
        const topStart = (1-seg.to)*100, topEnd = (1-seg.from)*100;
        if(topEnd <= topStart) continue;
        stops.push(seg.color + ' ' + topStart.toFixed(2) + '%');
        stops.push(seg.color + ' ' + topEnd.toFixed(2) + '%');
      }
      document.getElementById('gaugeBar').style.background = 'linear-gradient(180deg, ' + stops.join(', ') + ')';
      document.getElementById('centerMark').style.top = ((1-POWER_CENTER)*100).toFixed(2) + '%';
      document.getElementById('centerMark').style.left = '';
    }
  }

  window.addEventListener('resize', paintGauge);

  // ============================================================
  //  STATE
  // ============================================================
  const Phase = { MENU:'menu', POSITION:'position', DIRECTION:'direction', POWER:'power', THROWING:'throwing', SWITCH:'switch', ROUND_END:'round_end' };

  const S = {
    mode: null,                 // 'pvp' | 'ai'
    phase: Phase.MENU,
    players: [
      { id:0, label:'PLAYER 1', color:'#c1453d', dark:'#7e2c26', score:0, thrown:0 },
      { id:1, label:'PLAYER 2', color:'#e3ab38', dark:'#9c701f', score:0, thrown:0, isAI:false }
    ],
    current: 0,
    stones: [],                 // {x,y,vx,vy,owner,resting,spin}
    t: 0,                       // global clock (s)
    oscStartTime: 0,
    lockedX: POS_CENTER,
    lockedAngle: 0,
    lockedPower: 0.7,
    aiTarget: null,
    aiArmed: false,
    lastFrame: null,
    pendingNext: false
  };

  // ============================================================
  //  DOM REFS
  // ============================================================
  const canvas = document.getElementById('rink');
  const ctx = canvas.getContext('2d');
  const DPR = Math.min(window.devicePixelRatio || 1, 2.5);
  canvas.width = SHEET_W * DPR;
  canvas.height = SHEET_H * DPR;
  ctx.scale(DPR, DPR);
  const instructionEl = document.getElementById('instruction');
  const gaugeWrap = document.getElementById('gaugeWrap');
  const marker = document.getElementById('marker');
  const toastEl = document.getElementById('toast');
  const menuOverlay = document.getElementById('menuOverlay');
  const endOverlay = document.getElementById('endOverlay');

  function toast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toast._h);
    toast._h = setTimeout(()=>toastEl.classList.remove('show'), 1400);
  }

  // ============================================================
  //  ARCADE AUDIO ENGINE (synthesised — no external audio files)
  // ============================================================
  const SFX = (function(){
    let actx = null, masterGain, musicGain, sfxGain, musicFilter, delay, feedback;
    let muted = false, musicStarted = false, musicTimer = null;
    let chordIndex = 0, nextChordTime = 0;

    // slow, icy chord progression (Am9 — Fmaj7 — Cmaj7 — G6-ish), each chord held for a while
    const CHORDS = [
      [220.00, 261.63, 329.63, 392.00],   // A3 C4 E4 G4
      [174.61, 220.00, 261.63, 329.63],   // F3 A3 C4 E4
      [196.00, 246.94, 293.66, 392.00],   // G3 B3 D4 G4
      [164.81, 196.00, 246.94, 329.63]    // E3 G3 B3 E4
    ];
    const CHORD_DUR = 5.6;

    function ensure(){
      if(!actx){
        actx = new (window.AudioContext||window.webkitAudioContext)();
        masterGain = actx.createGain(); masterGain.gain.value = muted?0:1; masterGain.connect(actx.destination);

        musicFilter = actx.createBiquadFilter(); musicFilter.type = 'lowpass'; musicFilter.frequency.value = 1500; musicFilter.Q.value = 0.4;
        musicFilter.connect(masterGain);

        // slow "breathing" cutoff sweep so the pad isn't perfectly static
        const filterLFO = actx.createOscillator(); filterLFO.type = 'sine'; filterLFO.frequency.value = 0.045;
        const filterLFOGain = actx.createGain(); filterLFOGain.gain.value = 280;
        filterLFO.connect(filterLFOGain); filterLFOGain.connect(musicFilter.frequency);
        filterLFO.start();

        // a light feedback-delay "reverb" so the pad feels spacious rather than dry/cheap
        delay = actx.createDelay(2.0); delay.delayTime.value = 0.46;
        feedback = actx.createGain(); feedback.gain.value = 0.36;
        delay.connect(feedback); feedback.connect(delay);
        delay.connect(musicFilter);

        musicGain = actx.createGain(); musicGain.gain.value = 1;
        musicGain.connect(musicFilter);   // dry
        musicGain.connect(delay);         // wet (reverb send)

        sfxGain = actx.createGain(); sfxGain.gain.value = 0.32; sfxGain.connect(masterGain);
      }
      if(actx.state === 'suspended') actx.resume();
    }

    function blip(freq, start, dur, type, dest, peak){
      const osc = actx.createOscillator();
      osc.type = type; osc.frequency.value = freq;
      const g = actx.createGain();
      g.gain.setValueAtTime(0.0001, start);
      g.gain.exponentialRampToValueAtTime(peak, start+0.03);
      g.gain.exponentialRampToValueAtTime(0.0001, start+dur);
      osc.connect(g); g.connect(dest);
      osc.start(start); osc.stop(start+dur+0.02);
    }

    // a single pad voice: two gently detuned oscillators (chorus-like warmth) under one slow envelope
    function padNote(freq, start, dur, peak, pan){
      const o1 = actx.createOscillator(); o1.type = 'triangle'; o1.frequency.value = freq;
      const o2 = actx.createOscillator(); o2.type = 'sine';     o2.frequency.value = freq * 1.0035;
      const g = actx.createGain();
      g.gain.setValueAtTime(0.0001, start);
      g.gain.exponentialRampToValueAtTime(peak, start + dur*0.22);
      g.gain.setValueAtTime(peak, start + dur*0.7);
      g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
      o1.connect(g); o2.connect(g);
      if(actx.createStereoPanner){
        const p = actx.createStereoPanner(); p.pan.value = pan || 0;
        g.connect(p); p.connect(musicGain);
      } else {
        g.connect(musicGain);
      }
      o1.start(start); o1.stop(start+dur+0.05);
      o2.start(start); o2.stop(start+dur+0.05);
    }

    const VOICE_PAN = [-0.05, -0.55, 0.5, 0.3];
    function scheduler(){
      if(muted || !musicStarted) return;
      while(nextChordTime < actx.currentTime + 0.6){
        const chord = CHORDS[chordIndex % CHORDS.length];
        chord.forEach((f,i)=> padNote(f, nextChordTime, CHORD_DUR, i===0 ? 0.075 : 0.05, VOICE_PAN[i % VOICE_PAN.length]));
        if(Math.random() < 0.6){
          const top = chord[1 + Math.floor(Math.random()*(chord.length-1))] * 2;
          padNote(top, nextChordTime + CHORD_DUR*0.35, CHORD_DUR*0.5, 0.03, (Math.random()-0.5)*0.8);
        }
        nextChordTime += CHORD_DUR;
        chordIndex++;
      }
      musicTimer = setTimeout(scheduler, 400);
    }

    function startMusic(){
      ensure();
      if(musicStarted) return;
      musicStarted = true;
      nextChordTime = actx.currentTime + 0.1;
      scheduler();
    }

    function setMuted(m){
      muted = m;
      if(masterGain) masterGain.gain.value = m ? 0 : 1;
      if(!m && musicStarted) scheduler();
    }

    return {
      startMusic, setMuted,
      lock(){ ensure(); blip(880, actx.currentTime, 0.07, 'square', sfxGain, 0.4); },
      release(){ ensure(); blip(200, actx.currentTime, 0.2, 'sawtooth', sfxGain, 0.3); },
      coin(pts){
        ensure();
        const t = actx.currentTime;
        blip(988, t, 0.09, 'square', sfxGain, 0.45);
        blip(1318, t+0.09, 0.12, 'square', sfxGain, 0.45);
        if(pts >= 50) blip(1568, t+0.20, 0.14, 'square', sfxGain, 0.45);
      },
      jackpot(){
        ensure();
        const t = actx.currentTime;
        [523.25,659.25,783.99,1046.5,1318.5].forEach((f,i)=> blip(f, t+i*0.09, 0.18, 'square', sfxGain, 0.5));
      },
      win(){
        ensure();
        const t = actx.currentTime;
        [523.25,659.25,783.99].forEach((f,i)=> blip(f, t+i*0.13, 0.32, 'triangle', sfxGain, 0.45));
      }
    };
  })();

  const muteBtn = document.getElementById('muteBtn');
  let isMuted = false;
  muteBtn.addEventListener('click', ()=>{
    isMuted = !isMuted;
    SFX.setMuted(isMuted);
    muteBtn.textContent = isMuted ? '🔇' : '🔊';
  });


  // ============================================================
  //  MENU / SETUP
  // ============================================================
  document.getElementById('modePvP').addEventListener('click', ()=> startGame('pvp'));
  document.getElementById('modeAI').addEventListener('click', ()=> startGame('ai'));
  document.getElementById('playAgainBtn').addEventListener('click', ()=>{
    endOverlay.classList.add('hidden');
    startGame(S.mode);
  });
  document.getElementById('menuBtn').addEventListener('click', goToMenu);

  function goToMenu(){
    S.phase = Phase.MENU;
    S.stones = [];
    S.aiTarget = null;
    gaugeWrap.classList.remove('show');
    instructionEl.textContent = '';
    endOverlay.classList.add('hidden');
    menuOverlay.classList.remove('hidden');
  }

  function startGame(mode){
    SFX.startMusic();
    S.mode = mode;
    S.players[0].label = 'PLAYER 1';
    S.players[1].label = (mode==='ai') ? 'AI' : 'PLAYER 2';
    S.players[1].isAI = (mode==='ai');
    S.players[0].score = 0; S.players[1].score = 0;
    S.players[0].thrown = 0; S.players[1].thrown = 0;
    S.stones = [];
    S.current = 0;
    document.getElementById('p1name').textContent = S.players[0].label;
    document.getElementById('p2name').textContent = S.players[1].label;
    document.getElementById('finalP1name').textContent = S.players[0].label;
    document.getElementById('finalP2name').textContent = S.players[1].label;
    buildDots();
    updateHUD();
    menuOverlay.classList.add('hidden');
    enterPhase(Phase.POSITION);
  }

  function buildDots(){
    for(const pid of [0,1]){
      const wrap = document.getElementById('p'+(pid+1)+'dots');
      wrap.innerHTML = '';
      for(let i=0;i<STONES_PER_PLAYER;i++){
        const d = document.createElement('div');
        d.className = 'dot p'+(pid+1);
        wrap.appendChild(d);
      }
    }
  }

  function updateHUD(){
    document.getElementById('p1score').textContent = S.players[0].score;
    document.getElementById('p2score').textContent = S.players[1].score;
    document.getElementById('p1name').classList.toggle('active', S.current===0 && S.phase!==Phase.MENU && S.phase!==Phase.ROUND_END);
    document.getElementById('p2name').classList.toggle('active', S.current===1 && S.phase!==Phase.MENU && S.phase!==Phase.ROUND_END);
    for(const pid of [0,1]){
      const wrap = document.getElementById('p'+(pid+1)+'dots');
      const dots = wrap.children;
      for(let i=0;i<dots.length;i++){
        dots[i].classList.toggle('used', i < S.players[pid].thrown);
      }
    }
  }

  // ============================================================
  //  PHASE MACHINE
  // ============================================================
  function enterPhase(phase){
    S.phase = phase;
    const player = S.players[S.current];

    if(phase === Phase.POSITION){
      S.oscStartTime = S.t;
      instructionEl.textContent = (player.isAI ? player.label+' прицеливается…' : 'Шаг 1/3 — коснитесь льда, чтобы выбрать позицию');
      gaugeWrap.classList.remove('show');
      if(player.isAI) armAI('position');
    }
    else if(phase === Phase.DIRECTION){
      S.oscStartTime = S.t;
      instructionEl.textContent = (player.isAI ? player.label+' выбирает направление…' : 'Шаг 2/3 — коснитесь льда, чтобы выбрать направление');
      gaugeWrap.classList.remove('show');
      if(player.isAI) armAI('direction');
    }
    else if(phase === Phase.POWER){
      S.oscStartTime = S.t;
      instructionEl.textContent = (player.isAI ? player.label+' выбирает силу…' : 'Шаг 3/3 — коснитесь льда, чтобы бросить');
      gaugeWrap.classList.add('show');
      if(player.isAI) armAI('power');
    }
    else if(phase === Phase.THROWING){
      instructionEl.textContent = 'Камень летит…';
      gaugeWrap.classList.remove('show');
    }
  }

  function armAI(kind){
    const noise = (a)=> (Math.random()-0.5)*a;
    if(!S.aiTarget) S.aiTarget = {};
    if(kind === 'position'){
      // aim roughly at the button, with imprecision; occasionally play a guard off-center
      const guard = Math.random() < 0.22;
      const base = guard ? POS_CENTER + (Math.random()<0.5? -1:1)*70 : POS_CENTER;
      S.aiTarget.x = base + noise(46);
      S.aiTarget.guard = guard;
      S.aiTarget.tolX = 9;
    } else if(kind === 'direction'){
      S.aiTarget.angle = noise(0.10);
      S.aiTarget.tolA = 0.035;
    } else if(kind === 'power'){
      S.aiTarget.power = S.aiTarget.guard ? (0.42 + Math.random()*0.16) : (0.78 + Math.random()*0.18);
      S.aiTarget.tolP = 0.03;
    }
  }

  // current oscillating value getters --------------------------------
  function oscPosX(){
    const phase = (S.t - S.oscStartTime) * (2*Math.PI/OSC_PERIOD_POS);
    return POS_CENTER + POS_AMP * Math.sin(phase);
  }
  function oscAngle(){
    const phase = (S.t - S.oscStartTime) * (2*Math.PI/OSC_PERIOD_ANGLE);
    return ANGLE_MAX * Math.sin(phase);
  }
  function oscPower(){ // triangle wave 0..1..0
    const period = OSC_PERIOD_POWER;
    let tt = ((S.t - S.oscStartTime) % period) / period * 2;
    return tt <= 1 ? tt : 2 - tt;
  }

  function lockCurrent(){
    SFX.lock();
    if(S.phase === Phase.POSITION){
      S.lockedX = oscPosX();
      enterPhase(Phase.DIRECTION);
    } else if(S.phase === Phase.DIRECTION){
      S.lockedAngle = oscAngle();
      enterPhase(Phase.POWER);
    } else if(S.phase === Phase.POWER){
      S.lockedPower = oscPower();
      releaseStone();
    }
  }

  canvas.addEventListener('pointerdown', (e)=>{
    e.preventDefault();
    if(S.phase===Phase.POSITION || S.phase===Phase.DIRECTION || S.phase===Phase.POWER){
      if(!S.players[S.current].isAI) lockCurrent();
    }
  });
  window.addEventListener('keydown', (e)=>{
    if(e.code === 'Space'){
      e.preventDefault();
      if((S.phase===Phase.POSITION || S.phase===Phase.DIRECTION || S.phase===Phase.POWER) && !S.players[S.current].isAI){
        lockCurrent();
      }
    }
  });

  // ============================================================
  //  THROW
  // ============================================================
  function releaseStone(){
    SFX.release();
    const player = S.players[S.current];
    const speed = SPEED_MIN + (SPEED_MAX - SPEED_MIN) * S.lockedPower;
    const ang = S.lockedAngle;
    const vx = speed * Math.sin(ang);
    const vy = -speed * Math.cos(ang);
    S.stones.push({
      x: S.lockedX, y: HACK_Y, vx, vy,
      owner: S.current, color: player.color, dark: player.dark,
      resting:false, spin: Math.random()<0.5 ? -1 : 1,
      handleAngle: Math.random()*Math.PI,
      speckles: Array.from({length:6}, ()=>{
        const ang = Math.random()*Math.PI*2, dist = Math.random()*STONE_R*0.7;
        return { dx: Math.cos(ang)*dist, dy: Math.sin(ang)*dist, r: 0.7+Math.random()*1.2, a: (0.07+Math.random()*0.10).toFixed(2) };
      })
    });
    S.aiTarget = null;
    enterPhase(Phase.THROWING);
  }

  function allStonesAtRest(){
    for(const s of S.stones){ if(!s.resting) return false; }
    return true;
  }

  function recomputeScores(){
    let t0 = 0, t1 = 0;
    for(const s of S.stones){ if(s.owner===0) t0 += pointsForStone(s); else t1 += pointsForStone(s); }
    S.players[0].score = t0;
    S.players[1].score = t1;
  }

  function finishThrowIfSettled(){
    if(S.phase !== Phase.THROWING) return;
    if(!allStonesAtRest()) return;
    const player = S.players[S.current];
    player.thrown++;

    const justThrown = S.stones[S.stones.length-1];
    const pts = pointsForStone(justThrown);
    recomputeScores();
    updateHUD();

    if(pts === 100){ toast('ДЖЕКПОТ! +100'); SFX.jackpot(); }
    else if(pts > 0){ toast('+' + pts + ' очков'); SFX.coin(pts); }
    else { toast('Камень вне дома — 0'); }

    const totalThrown = S.players[0].thrown + S.players[1].thrown;
    if(totalThrown >= STONES_PER_PLAYER*2){
      scoreEnd();
      return;
    }
    S.current = 1 - S.current;
    updateHUD();
    enterPhase(Phase.POSITION);
  }

  function scoreEnd(){
    S.phase = Phase.ROUND_END;
    instructionEl.textContent = '';
    SFX.win();

    document.getElementById('finalP1score').textContent = S.players[0].score;
    document.getElementById('finalP2score').textContent = S.players[1].score;
    document.getElementById('endTitle').textContent = 'КОНЕЦ ИГРЫ';

    let sub;
    if(S.players[0].score === S.players[1].score) sub = 'Ничья по очкам!';
    else{
      const winner = S.players[0].score > S.players[1].score ? S.players[0] : S.players[1];
      sub = winner.label + ' побеждает со счётом ' + winner.score + '!';
    }
    document.getElementById('endSubtitle').textContent = sub;
    document.getElementById('endOverlay').classList.remove('hidden');
  }

  // ============================================================
  //  PHYSICS
  // ============================================================
  function stepPhysics(dt){
    for(const s of S.stones){
      if(s.resting) continue;
      const speed = Math.hypot(s.vx, s.vy);
      if(speed <= REST_EPS){
        s.vx = 0; s.vy = 0; s.resting = true;
        continue;
      }
      // friction opposing velocity
      const fx = -FRICTION * (s.vx/speed);
      const fy = -FRICTION * (s.vy/speed);
      // gentle curl: lateral accel perpendicular to travel direction
      const px = -s.vy/speed, py = s.vx/speed; // perpendicular unit vector
      const cx = px * CURL_ACCEL * s.spin;
      const cy = py * CURL_ACCEL * s.spin;

      s.vx += (fx + cx) * dt;
      s.vy += (fy + cy) * dt;
      s.x += s.vx * dt;
      s.y += s.vy * dt;

      // walls
      if(s.x - STONE_R < MARGIN){ s.x = MARGIN + STONE_R; s.vx *= -0.55; }
      if(s.x + STONE_R > SHEET_W - MARGIN){ s.x = SHEET_W - MARGIN - STONE_R; s.vx *= -0.55; }
      if(s.y - STONE_R < 18){ s.y = 18 + STONE_R; s.vy *= -0.45; }
      if(s.y + STONE_R > SHEET_H - 18){ s.y = SHEET_H - 18 - STONE_R; s.vy *= -0.45; }
    }

    // collisions (equal mass elastic, simplified)
    for(let i=0;i<S.stones.length;i++){
      for(let j=i+1;j<S.stones.length;j++){
        const a = S.stones[i], b = S.stones[j];
        const dx = b.x-a.x, dy = b.y-a.y;
        const dist = Math.hypot(dx,dy);
        const minDist = STONE_R*2;
        if(dist > 0 && dist < minDist){
          const nx = dx/dist, ny = dy/dist;
          const overlap = (minDist - dist)/2;
          a.x -= nx*overlap; a.y -= ny*overlap;
          b.x += nx*overlap; b.y += ny*overlap;
          const avn = a.vx*nx + a.vy*ny;
          const bvn = b.vx*nx + b.vy*ny;
          a.vx += (bvn-avn)*nx; a.vy += (bvn-avn)*ny;
          b.vx += (avn-bvn)*nx; b.vy += (avn-bvn)*ny;
          a.resting = false; b.resting = false;
        }
      }
    }
  }

  // ============================================================
  //  AI auto-lock watcher
  // ============================================================
  function aiWatch(){
    if(S.phase===Phase.MENU || S.phase===Phase.ROUND_END || S.phase===Phase.THROWING) return;
    const player = S.players[S.current];
    if(!player.isAI || !S.aiTarget) return;
    const elapsed = S.t - S.oscStartTime;
    if(S.phase === Phase.POSITION){
      if(elapsed > 0.18 && Math.abs(oscPosX() - S.aiTarget.x) < S.aiTarget.tolX) lockCurrent();
      else if(elapsed > 5) lockCurrent();
    } else if(S.phase === Phase.DIRECTION){
      if(elapsed > 0.18 && Math.abs(oscAngle() - S.aiTarget.angle) < S.aiTarget.tolA) lockCurrent();
      else if(elapsed > 5) lockCurrent();
    } else if(S.phase === Phase.POWER){
      if(elapsed > 0.18 && Math.abs(oscPower() - S.aiTarget.power) < S.aiTarget.tolP) lockCurrent();
      else if(elapsed > 5) lockCurrent();
    }
  }

  // ============================================================
  //  RENDER
  // ============================================================
  const SPARKLES = Array.from({length:22}, ()=>({
    x: MARGIN + Math.random()*(SHEET_W-2*MARGIN),
    y: 20 + Math.random()*(SHEET_H-40),
    r: 0.6 + Math.random()*1.3,
    phase: Math.random()*Math.PI*2,
    speed: 0.8 + Math.random()*0.8
  }));

  function drawRink(){
    ctx.clearRect(0,0,SHEET_W,SHEET_H);

    // ice — layered gradient for depth + a soft sheen
    const iceGrad = ctx.createLinearGradient(0,0,0,SHEET_H);
    iceGrad.addColorStop(0, '#eef9fd');
    iceGrad.addColorStop(0.5, '#dcf0f8');
    iceGrad.addColorStop(1, '#b9def0');
    ctx.fillStyle = iceGrad;
    ctx.fillRect(0,0,SHEET_W,SHEET_H);

    const sheen = ctx.createRadialGradient(POS_CENTER-40, 60, 10, POS_CENTER, 220, 320);
    sheen.addColorStop(0, 'rgba(255,255,255,0.35)');
    sheen.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = sheen;
    ctx.fillRect(0,0,SHEET_W,SHEET_H);

    // frost sparkle
    for(const p of SPARKLES){
      const a = 0.12 + 0.14*(0.5+0.5*Math.sin(S.t*p.speed + p.phase));
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,255,'+a.toFixed(3)+')';
      ctx.fill();
    }

    // side boards
    ctx.strokeStyle = 'rgba(11,31,51,0.35)';
    ctx.lineWidth = 4;
    ctx.strokeRect(MARGIN-6, 14, SHEET_W - (MARGIN-6)*2, SHEET_H-28);

    // centre line
    ctx.strokeStyle = 'rgba(11,31,51,0.18)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(POS_CENTER, 18); ctx.lineTo(POS_CENTER, SHEET_H-18);
    ctx.stroke();

    // hog line
    ctx.strokeStyle = 'rgba(193,69,61,0.55)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(MARGIN-6, HACK_Y - 90); ctx.lineTo(SHEET_W-MARGIN+6, HACK_Y - 90);
    ctx.stroke();

    // hack marks
    ctx.fillStyle = 'rgba(11,31,51,0.5)';
    ctx.fillRect(POS_CENTER-16, HACK_Y-3, 10, 6);
    ctx.fillRect(POS_CENTER+6, HACK_Y-3, 10, 6);

    // house — heat-coded rings, closer to centre = more points
    for(let i=RING_BANDS.length-1; i>=0; i--){
      drawRing(RING_BANDS[i].upTo, RING_BANDS[i].color);
    }

    // pulsing jackpot glow on the 100-point bullseye
    const pulse = 0.5 + 0.5*Math.sin(S.t*3.2);
    ctx.save();
    ctx.beginPath();
    ctx.arc(POS_CENTER, HOUSE_Y, RINGS.button + 5, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(255,222,140,' + (0.35+0.4*pulse).toFixed(3) + ')';
    ctx.lineWidth = 3 + 2*pulse;
    ctx.stroke();
    ctx.restore();

    // point-value labels going outward from the button along the centre line
    ctx.save();
    ctx.font = '700 11px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const labelSpots = [
      { y: HOUSE_Y,                                            txt:'100' },
      { y: HOUSE_Y + (RINGS.button+RINGS.inner)/2,             txt:'50'  },
      { y: HOUSE_Y + (RINGS.inner+RINGS.mid)/2,                txt:'25'  },
      { y: HOUSE_Y + (RINGS.mid+RINGS.outer)/2,                txt:'10'  }
    ];
    for(const spot of labelSpots){
      ctx.lineWidth = 3;
      ctx.strokeStyle = 'rgba(11,31,51,0.55)';
      ctx.strokeText(spot.txt, POS_CENTER, spot.y);
      ctx.fillStyle = '#f5fbfd';
      ctx.fillText(spot.txt, POS_CENTER, spot.y);
    }
    ctx.restore();
  }

  function drawRing(r, color){
    ctx.beginPath();
    ctx.arc(POS_CENTER, HOUSE_Y, r, 0, Math.PI*2);
    ctx.fillStyle = color;
    ctx.fill();
    ctx.lineWidth = 1;
    ctx.strokeStyle = 'rgba(11,31,51,0.18)';
    ctx.stroke();
  }

  function drawStone(s){
    ctx.save();
    // soft contact shadow
    ctx.beginPath();
    ctx.ellipse(s.x+2, s.y+3, STONE_R*0.95, STONE_R*0.65, 0, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(11,31,51,0.22)';
    ctx.fill();
    ctx.restore();

    ctx.save();
    ctx.translate(s.x, s.y);

    // granite body
    const body = ctx.createRadialGradient(-4,-5,2, 0,0, STONE_R+4);
    body.addColorStop(0, '#80868f');
    body.addColorStop(0.45, '#54595f');
    body.addColorStop(1, '#202327');
    ctx.beginPath();
    ctx.arc(0,0,STONE_R,0,Math.PI*2);
    ctx.fillStyle = body;
    ctx.fill();

    // granite speckle texture (stable per-stone, set when the stone was thrown)
    for(const sp of s.speckles){
      ctx.beginPath();
      ctx.arc(sp.dx, sp.dy, sp.r, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,255,'+sp.a+')';
      ctx.fill();
    }

    // polished running band near the edge
    ctx.beginPath();
    ctx.arc(0,0,STONE_R*0.9,0,Math.PI*2);
    ctx.lineWidth = STONE_R*0.14;
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.stroke();

    ctx.lineWidth = 1.4;
    ctx.strokeStyle = 'rgba(0,0,0,0.45)';
    ctx.beginPath();
    ctx.arc(0,0,STONE_R,0,Math.PI*2);
    ctx.stroke();

    // coloured handle, seen from above — grip bar + bolt, like a real stone's handle
    const hr = STONE_R*0.5;
    ctx.save();
    ctx.rotate(s.handleAngle || 0);
    ctx.fillStyle = 'rgba(8,16,26,0.55)';
    ctx.beginPath();
    ctx.ellipse(0,0, hr*1.55, hr*0.4, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    const hgrad = ctx.createRadialGradient(-hr*0.3,-hr*0.3,1, 0,0, hr);
    hgrad.addColorStop(0, '#ffffff');
    hgrad.addColorStop(0.32, s.color);
    hgrad.addColorStop(1, s.dark);
    ctx.beginPath();
    ctx.arc(0,0,hr,0,Math.PI*2);
    ctx.fillStyle = hgrad;
    ctx.fill();
    ctx.lineWidth = 1; ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.stroke();

    // centre bolt
    ctx.beginPath();
    ctx.arc(0,0,hr*0.24,0,Math.PI*2);
    ctx.fillStyle = 'rgba(15,15,15,0.65)';
    ctx.fill();

    // tiny specular highlight on the granite body
    ctx.beginPath();
    ctx.arc(-STONE_R*0.4, -STONE_R*0.45, STONE_R*0.18, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fill();
    ctx.restore();
  }

  function drawAimOverlay(){
    const player = S.players[S.current];
    if(S.phase === Phase.POSITION){
      const x = oscPosX();
      ctx.save();
      ctx.strokeStyle = 'rgba(84,214,227,0.85)';
      ctx.lineWidth = 2;
      ctx.setLineDash([5,5]);
      ctx.beginPath();
      ctx.moveTo(x, HACK_Y+10); ctx.lineTo(x, HACK_Y-160);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.beginPath();
      ctx.arc(x, HACK_Y, STONE_R, 0, Math.PI*2);
      ctx.fillStyle = player.color;
      ctx.globalAlpha = 0.85;
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.lineWidth = 2;
      ctx.strokeStyle = '#54d6e3';
      ctx.stroke();
      ctx.restore();
    }
    else if(S.phase === Phase.DIRECTION || S.phase === Phase.POWER){
      const x = S.lockedX;
      const ang = (S.phase===Phase.DIRECTION) ? oscAngle() : S.lockedAngle;
      const tipX = x + Math.sin(ang)*ARROW_LEN;
      const tipY = HACK_Y - Math.cos(ang)*ARROW_LEN;
      ctx.save();
      // stone at base
      ctx.beginPath();
      ctx.arc(x, HACK_Y, STONE_R, 0, Math.PI*2);
      ctx.fillStyle = player.color;
      ctx.fill();
      ctx.lineWidth = 2; ctx.strokeStyle = '#0b1f33'; ctx.stroke();
      // arrow shaft
      ctx.strokeStyle = '#54d6e3';
      ctx.lineWidth = 4;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(x, HACK_Y);
      ctx.lineTo(tipX, tipY);
      ctx.stroke();
      // arrow head
      const headAng = Math.atan2(tipY-HACK_Y, tipX-x);
      ctx.beginPath();
      ctx.moveTo(tipX, tipY);
      ctx.lineTo(tipX - 11*Math.cos(headAng-0.4), tipY - 11*Math.sin(headAng-0.4));
      ctx.lineTo(tipX - 11*Math.cos(headAng+0.4), tipY - 11*Math.sin(headAng+0.4));
      ctx.closePath();
      ctx.fillStyle = '#54d6e3';
      ctx.fill();
      ctx.restore();
    }
  }

  function render(){
    drawRink();
    for(const s of S.stones) drawStone(s);
    if(S.phase===Phase.POSITION || S.phase===Phase.DIRECTION || S.phase===Phase.POWER){
      drawAimOverlay();
    }
    if(S.phase === Phase.POWER){
      const p = oscPower();
      if(isMobileLayout()){
        marker.style.left = (p * (120 - 12)) + 'px';
        marker.style.top = '';
      } else {
        marker.style.top = ((1-p) * (160-12)) + 'px';
        marker.style.left = '';
      }
    }
  }

  // ============================================================
  //  MAIN LOOP
  // ============================================================
  function loop(now){
    if(S.lastFrame===null) S.lastFrame = now;
    const dt = Math.min(0.04, (now - S.lastFrame)/1000);
    S.lastFrame = now;
    S.t += dt;

    if(S.phase === Phase.THROWING){
      stepPhysics(dt);
      finishThrowIfSettled();
    }
    aiWatch();
    render();
    requestAnimationFrame(loop);
  }

  paintGauge();
  requestAnimationFrame(loop);

})();
</script>
</body>
</html>
